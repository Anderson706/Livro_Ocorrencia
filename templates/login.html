{% extends "base.html" %}

{% block title %}Login | Livro de Ocorrência{% endblock %}

{% block body %}

<style>
  :root{
    --dhl-yellow:#ffcc00;
    --dhl-red:#d40511;
    --line:#e5e7eb;
    --text:#1f2937;
    --muted:#6b7280;
    --bg:#f4f5f7;
    --card:#ffffff;
    --shadow:0 12px 30px rgba(0,0,0,.12);
  }

  *{ box-sizing:border-box; }

  .login-wrap{
    width:100%;
    max-width:1400px;
    margin:0 auto;
  }

  .login-card{
    width:100%;
    min-height:calc(100vh - 170px);
    background:var(--card);
    border-radius:18px;
    padding:40px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    align-items:center;
  }

  .left{
    padding-right:20px;
  }

  .title{
    font-size:38px;
    color:var(--dhl-red);
    font-weight:800;
    margin-bottom:10px;
  }

  .subtitle{
    color:var(--muted);
    font-size:16px;
    line-height:1.6;
    max-width:620px;
  }

  .form-box{
    width:100%;
    max-width:460px;
    justify-self:end;
  }

  .field{
    margin-bottom:16px;
  }

  label{
    display:block;
    margin-bottom:6px;
    font-weight:700;
    color:var(--text);
  }

  input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:14px;
    outline:none;
  }

  input:focus{
    border-color:var(--dhl-red);
    box-shadow:0 0 0 3px rgba(212,5,17,.10);
  }

  .btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:800;
    cursor:pointer;
    margin-top:6px;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .btn-primary{
    background:var(--dhl-yellow);
    color:#111;
  }

  .btn-secondary{
    background:#111;
    color:#fff;
    margin-top:12px;
  }

  .login-badge{
    display:inline-block;
    margin-bottom:14px;
    padding:8px 14px;
    border-radius:999px;
    background:#fff4db;
    color:#9a6700;
    font-weight:800;
    font-size:12px;
    letter-spacing:.4px;
  }

  @media (max-width: 900px){
    .login-card{
      grid-template-columns:1fr;
      min-height:auto;
      padding:24px;
    }

    .left{
      padding-right:0;
    }

    .form-box{
      max-width:100%;
      justify-self:stretch;
    }

    .title{
      font-size:30px;
    }
  }
</style>

<div class="login-wrap">
  <div class="login-card">

    <div class="left">
      <div class="login-badge">DHL SECURITY</div>
      <div class="title">Livro de Ocorrência</div>
      <div class="subtitle">
        Sistema corporativo para registro e controle de ocorrências operacionais.
        Acesse com suas credenciais para continuar.
      </div>
    </div>

    <div class="form-box">
      <form method="POST">
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <a href="{{ url_for('criar_usuario') }}" class="btn btn-secondary">
        Criar Usuário
      </a>
    </div>

  </div>
</div>

{% endblock %}
