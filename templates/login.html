<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login | Livro de Ocorrência</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --dhl-yellow:#ffcc00;
      --dhl-red:#d40511;
      --line:#e5e7eb;
    }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f4f5f7;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      padding:28px;
      box-shadow:0 12px 30px rgba(0,0,0,.12);
      border:1px solid var(--line);
    }
    h1{
      margin:0 0 18px;
      color:var(--dhl-red);
      font-size:28px;
    }
    label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      color:#374151;
    }
    input{
      width:100%;
      padding:12px 14px;
      border:1px solid #d1d5db;
      border-radius:12px;
      font-size:14px;
      box-sizing:border-box;
      margin-bottom:14px;
    }
    button{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:12px;
      background:var(--dhl-yellow);
      font-weight:800;
      cursor:pointer;
    }
    .flash{
      margin-bottom:12px;
      padding:10px 12px;
      border-radius:10px;
      background:#fff4db;
      color:#9a6700;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>E-mail</label>
      <input type="email" name="email" placeholder="Digite seu e-mail" required>

      <label>Senha</label>
      <input type="password" name="password" placeholder="Digite sua senha" required>

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
