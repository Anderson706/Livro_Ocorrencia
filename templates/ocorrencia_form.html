<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Editar Ocorrência</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:#f4f5f7;padding:30px;}
    .card{max-width:1100px;margin:0 auto;background:#fff;border-radius:20px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
    .row{display:flex;gap:12px;flex-wrap:wrap;}
    .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px;}
    label{font-size:13px;color:#6b7280;font-weight:700;}
    input, select, textarea{width:100%;padding:12px 14px;border:1px solid #d6dae1;border-radius:12px;font-family:Arial, Helvetica, sans-serif;}
    textarea{min-height:120px;resize:vertical;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
    .btn{border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
    .btn-red{background:#d40511;color:#fff;}
    .btn-dark{background:#2f343a;color:#fff;}
    h1{margin-top:0;color:#d40511;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Editar Ocorrência #{{ ocorrencia.id }}</h1>

    <form method="POST">
      <div class="row">
        <div class="field">
          <label>Data</label>
          <input type="date" name="data_ocorrencia" value="{{ ocorrencia.data_ocorrencia.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="field">
          <label>Hora</label>
          <input type="datetime-local" name="data_hora_registro" value="{{ ocorrencia.data_hora_registro.strftime('%Y-%m-%dT%H:%M') }}" required>
        </div>
        <div class="field">
          <label>Site</label>
          <select name="site" required>
            <option value="SITE 1" {% if ocorrencia.site == 'SITE 1' %}selected{% endif %}>SITE 1</option>
            <option value="SITE 2" {% if ocorrencia.site == 'SITE 2' %}selected{% endif %}>SITE 2</option>
            <option value="SITE 3" {% if ocorrencia.site == 'SITE 3' %}selected{% endif %}>SITE 3</option>
          </select>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="row">
        <div class="field">
          <label>Turno</label>
          <select name="turno" required>
            <option value="TURNO A" {% if ocorrencia.turno == 'TURNO A' %}selected{% endif %}>TURNO A</option>
            <option value="TURNO B" {% if ocorrencia.turno == 'TURNO B' %}selected{% endif %}>TURNO B</option>
            <option value="TURNO C" {% if ocorrencia.turno == 'TURNO C' %}selected{% endif %}>TURNO C</option>
            <option value="ADM" {% if ocorrencia.turno == 'ADM' %}selected{% endif %}>ADM</option>
          </select>
        </div>
        <div class="field">
          <label>Setor / Área</label>
          <input type="text" name="setor" value="{{ ocorrencia.setor }}" required>
        </div>
        <div class="field">
          <label>Tipo de ocorrência</label>
          <input type="text" name="tipo_ocorrencia" value="{{ ocorrencia.tipo_ocorrencia }}" required>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="row">
        <div class="field">
          <label>Prioridade</label>
          <select name="prioridade" required>
            <option value="BAIXA" {% if ocorrencia.prioridade == 'BAIXA' %}selected{% endif %}>BAIXA</option>
            <option value="MEDIA" {% if ocorrencia.prioridade == 'MEDIA' %}selected{% endif %}>MÉDIA</option>
            <option value="ALTA" {% if ocorrencia.prioridade == 'ALTA' %}selected{% endif %}>ALTA</option>
            <option value="CRITICA" {% if ocorrencia.prioridade == 'CRITICA' %}selected{% endif %}>CRÍTICA</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select name="status" required>
            <option value="EM ABERTO" {% if ocorrencia.status == 'EM ABERTO' %}selected{% endif %}>EM ABERTO</option>
            <option value="EM ACOMPANHAMENTO" {% if ocorrencia.status == 'EM ACOMPANHAMENTO' %}selected{% endif %}>EM ACOMPANHAMENTO</option>
            <option value="FINALIZADO" {% if ocorrencia.status == 'FINALIZADO' %}selected{% endif %}>FINALIZADO</option>
          </select>
        </div>
        <div class="field">
          <label>Referência</label>
          <input type="text" name="referencia" value="{{ ocorrencia.referencia or '' }}">
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="row">
        <div class="field">
          <label>Responsável saída</label>
          <input type="text" name="responsavel_saida" value="{{ ocorrencia.responsavel_saida }}" required>
        </div>
        <div class="field">
          <label>Responsável entrada</label>
          <input type="text" name="responsavel_entrada" value="{{ ocorrencia.responsavel_entrada }}" required>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="field">
        <label>Descrição</label>
        <textarea name="descricao" required>{{ ocorrencia.descricao }}</textarea>
      </div>

      <div style="height:12px"></div>

      <div class="field">
        <label>Ações tomadas</label>
        <textarea name="acoes_tomadas">{{ ocorrencia.acoes_tomadas or '' }}</textarea>
      </div>

      <div style="height:12px"></div>

      <div class="field">
        <label>Pendências</label>
        <textarea name="pendencias">{{ ocorrencia.pendencias or '' }}</textarea>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-red">Salvar alterações</button>
        <a href="{{ url_for('index') }}" class="btn btn-dark">Voltar</a>
      </div>
    </form>
  </div>
</body>
</html>
