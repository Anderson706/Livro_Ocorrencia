<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Usuários</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:#f4f5f7;padding:30px;}
    .card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
    .btn{border:none;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
    .btn-red{background:#d40511;color:#fff;}
    .btn-dark{background:#2f343a;color:#fff;}
    table{width:100%;border-collapse:collapse;background:#fff;}
    th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;}
    th{background:#ffcc00;}
    .inline{display:inline;}
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h1>Usuários</h1>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a href="{{ url_for('novo_usuario') }}" class="btn btn-red">Novo usuário</a>
        <a href="{{ url_for('index') }}" class="btn btn-dark">Voltar</a>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Perfil</th>
          <th>Site</th>
          <th>Ativo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for u in usuarios %}
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.nome }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.site or '-' }}</td>
          <td>{{ 'SIM' if u.is_active else 'NÃO' }}</td>
          <td>
            <a href="{{ url_for('editar_usuario', user_id=u.id) }}" class="btn btn-dark">Editar</a>
            <form method="POST" action="{{ url_for('excluir_usuario', user_id=u.id) }}" class="inline" onsubmit="return confirm('Deseja excluir este usuário?');">
              <button type="submit" class="btn btn-red">Excluir</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="7">Nenhum usuário cadastrado.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
