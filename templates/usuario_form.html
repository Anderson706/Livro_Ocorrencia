<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>{% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:#f4f5f7;padding:30px;}
    .card{max-width:850px;margin:0 auto;background:#fff;border-radius:20px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
    .row{display:flex;gap:12px;flex-wrap:wrap;}
    .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px;}
    label{font-size:13px;color:#6b7280;font-weight:700;}
    input,select{width:100%;padding:12px 14px;border:1px solid #d6dae1;border-radius:12px;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
    .btn{border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
    .btn-red{background:#d40511;color:#fff;}
    .btn-dark{background:#2f343a;color:#fff;}
    h1{margin-top:0;color:#d40511;}
  </style>
</head>
<body>
  <div class="card">
    <h1>{% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %}</h1>

    <form method="POST">
      <div class="row">
        <div class="field">
          <label>Nome</label>
          <input type="text" name="nome" value="{{ usuario.nome if usuario else '' }}" required>
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" name="email" value="{{ usuario.email if usuario else '' }}" required>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="row">
        <div class="field">
          <label>Senha {% if usuario %}(deixe em branco para manter){% endif %}</label>
          <input type="password" name="senha" {% if not usuario %}required{% endif %}>
        </div>
        <div class="field">
          <label>Perfil</label>
          <select name="role" required>
            <option value="USER" {% if usuario and usuario.role == 'USER' %}selected{% endif %}>USER</option>
            <option value="ADMIN" {% if usuario and usuario.role == 'ADMIN' %}selected{% endif %}>ADMIN</option>
          </select>
        </div>
        <div class="field">
          <label>Site</label>
          <select name="site">
            <option value="">Selecione</option>
            <option value="SITE 1" {% if usuario and usuario.site == 'SITE 1' %}selected{% endif %}>SITE 1</option>
            <option value="SITE 2" {% if usuario and usuario.site == 'SITE 2' %}selected{% endif %}>SITE 2</option>
            <option value="SITE 3" {% if usuario and usuario.site == 'SITE 3' %}selected{% endif %}>SITE 3</option>
          </select>
        </div>
      </div>

      {% if usuario %}
      <div style="height:12px"></div>
      <div class="row">
        <div class="field">
          <label>Ativo</label>
          <select name="is_active">
            <option value="1" {% if usuario.is_active %}selected{% endif %}>SIM</option>
            <option value="0" {% if not usuario.is_active %}selected{% endif %}>NÃO</option>
          </select>
        </div>
      </div>
      {% endif %}

      <div class="actions">
        <button type="submit" class="btn btn-red">Salvar</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-dark">Voltar</a>
      </div>
    </form>
  </div>
</body>
</html>
